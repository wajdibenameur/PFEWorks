#  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:change-me}

keycloak:
  base-url: ${KEYCLOAK_BASE_URL:http://localhost:8091}
  realm: ${KEYCLOAK_REALM:my-realm}
  client-id: ${KEYCLOAK_CLIENT_ID:auth-service}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:auth-service-admin}
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
