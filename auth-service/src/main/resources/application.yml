#  realm: ${KEYCLOAK_REALM:my-realm}
#  # Client used by auth-service for password/refresh grants (frontend-facing client)
#  client-id: ${KEYCLOAK_CLIENT_ID:auth-service}
#  client-secret: ${KEYCLOAK_CLIENT_SECRET:change-me}
#  # Service-account client used for Admin API calls (client_credentials)
