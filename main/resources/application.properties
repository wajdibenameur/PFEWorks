# ===============================
# SERVER
# ===============================
server.port=8099

# ===============================
# DATABASE (for Observium, ZkBio, Camera status only)
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/monitoring_db?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.tn.iteam=DEBUG
logging.file.name=logs/monitoring.log
logging.level.org.springframework.web.client=DEBUG
logging.level.org.springframework.web.client.RestTemplate=DEBUG
# ===============================
# ZABBIX
# ===============================
zabbix.url=http://192.168.11.36/zabbix/api_jsonrpc.php
zabbix.username=
zabbix.password=
zabbix.usertoken=
logging.level.tn.iteam.config=DEBUG

# ===============================
# ZABBIX SCHEDULER (real-time WebSocket push)
# ===============================
# Interval in milliseconds for polling Zabbix problems (default: 30 seconds)
zabbix.scheduler.problems.rate=30000
# Interval in milliseconds for polling Zabbix metrics (default: 60 seconds)
zabbix.scheduler.metrics.rate=60000

# ===============================
# OBSERVIUM
# ===============================
observium.url=http://192.168.11.229
observium.token=TON_TOKEN_API_OBSERVIUM
observium.username=
observium.password=


# ===============================
# ZKBIO
# ===============================
zkbio.url=https://192.168.11.8:8098
zkbio.token=TON_TOKEN_API_ZKBIO
# ===============================
# CAMERA
# ===============================
camera.subnet=192.168.11
camera.ports=37777,554
