<article class="panel">
  <header class="panel-header">
    <h2>Data Coverage Disclosure</h2>
    <small>Transparency for real vs temporary derived data</small>
  </header>

  <div class="coverage-list">
    @for (item of items(); track item.title) {
      <div class="coverage-item">
        <div class="title-row">
          <h3>{{ item.title }}</h3>
          <span class="badge badge-{{ item.status }}">{{ item.status }}</span>
        </div>
        <p>{{ item.detail }}</p>
      </div>
    }
  </div>
</article>
