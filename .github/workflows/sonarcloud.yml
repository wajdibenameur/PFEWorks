name: CI SonarCloud

on:
  push:
    branches:
      - test
      - prod
      - main
      - master
  pull_request:
    branches:
      - test
      - prod
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: FrontEndF/package-lock.json

      - name: Make Maven wrapper executable
        working-directory: Backend
        run: chmod +x mvnw

      - name: Build backend and run tests
        working-directory: Backend
        run: ./mvnw -B test

      - name: Build frontend
        working-directory: FrontEndF
        run: npm ci && npm run build

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.PFEWORKS_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
