
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:${KEYCLOAK_BASE_URL:http://localhost:8091}/realms/${KEYCLOAK_REALM:my-realm}}

keycloak:
  base-url: ${KEYCLOAK_BASE_URL:http://localhost:8091}
  realm: ${KEYCLOAK_REALM:my-realm}
  client-id: ${KEYCLOAK_CLIENT_ID:auth-service}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:}
  client-confidential: ${KEYCLOAK_CLIENT_CONFIDENTIAL:true}
  redirect-uri: ${KEYCLOAK_REDIRECT_URI:http://localhost:8099/api/auth/callback}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:auth-service-admin}
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
  token-uri: ${KEYCLOAK_TOKEN_URI:${KEYCLOAK_BASE_URL:http://localhost:8091}/realms/${KEYCLOAK_REALM:my-realm}/protocol/openid-connect/token}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
  notifications:
    mail:
      enabled: ${APP_NOTIFICATIONS_MAIL_ENABLED:false}
      from: ${APP_NOTIFICATIONS_MAIL_FROM:no-reply@monitorflow.local}
  auth:
    frontend-callback-url: ${APP_AUTH_FRONTEND_CALLBACK_URL:http://localhost:4200/auth/callback}
    callback-ticket:
      ttl-seconds: ${APP_AUTH_CALLBACK_TICKET_TTL_SECONDS:60}
    refresh-cookie:
      name: ${APP_AUTH_REFRESH_COOKIE_NAME:REFRESH_TOKEN}
      path: ${APP_AUTH_REFRESH_COOKIE_PATH:/api/auth}
      same-site: ${APP_AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
      secure: ${APP_AUTH_REFRESH_COOKIE_SECURE:false}
      max-age-seconds: ${APP_AUTH_REFRESH_COOKIE_MAX_AGE_SECONDS:28800}
    state-cookie:
      name: ${APP_AUTH_STATE_COOKIE_NAME:OIDC_STATE}
      max-age-seconds: ${APP_AUTH_STATE_COOKIE_MAX_AGE_SECONDS:300}
  chat:
    auto-archive:
      enabled: ${APP_CHAT_AUTO_ARCHIVE_ENABLED:false}
      closed-days: ${APP_CHAT_AUTO_ARCHIVE_CLOSED_DAYS:30}
      cron: ${APP_CHAT_AUTO_ARCHIVE_CRON:0 30 2 * * *}
server:
  port: 8099
